name: djoulagest_mobile
description: "DjoulaGest — Application mobile de gestion intégrée multi-sites"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.1

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Fonctionnalités CDC
  mobile_scanner: ^5.1.1          # Scan QR code (missions logistiques) + code-barres
  signature: ^5.4.0               # Signature numérique de réception
  geolocator: ^12.0.0             # GPS tracking missions (polling 1 min)
  fl_chart: ^0.68.0               # Graphiques dashboard
  intl: ^0.19.0                   # Formatage dates, devises (GNF, USD, EUR)
  pdf: ^3.11.0                    # Génération bons de livraison PDF
  open_filex: ^4.3.4              # Ouverture PDF générés

  # Utilitaires
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  connectivity_plus: ^6.0.3       # Mode offline (CDC 6.3)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
